<!DOCTYPE html>
<html lang="en">
<head>
        <link rel="stylesheet" href="styles.css">
        <meta charset="UTF-8:>
        <meta name="viewport" content = "width=device-width, initial-scale=1.0">
        <title>Document</title>
</head>
<body>
<div class="calculator">
<h2 style="text-align: left;">Calculator</h2>
 <div class="display">0</div>
   <div class="button-group">
        <button class="button number">1</button>
        <button class="button number">2</button>   
        <button class="button number">3</button>  
        <button class="button number">4</button>
        <button class="button number">5</button>
        <button class="button number">6</button>
        <button class="button number">7</button>
        <button class="button number">8</button>
        <button class="button number">9</button>
        <button class="button decimal">.</button>
        <button class="button number">0</button>
        <button class="button negative">(-)</button>
   </div>
     <div class="operations">
        <button class="button clear" onclick="cleardisplay()";>CLEAR</button>
        <button class="button operation">+</button>
        <button class="button operation">-</button>
        <button class="button operation">x</button>
        <button class="button operation">/</button>
        <button class="button enter">ENTER</button>
     </div>
        <div id="container"></div>
 </div>
</div>
        <script src="calculator.js"></script>

</body>
</html>
